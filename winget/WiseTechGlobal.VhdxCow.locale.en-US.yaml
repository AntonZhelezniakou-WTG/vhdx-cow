License: Proprietary
ShortDescription: VHDX-backed Copy-on-Write for git worktrees on Windows
Description: >-
  VhdxCow manages VHDX differencing disks to provide copy-on-write semantics
  for git worktrees on Windows. A Windows Service handles privileged VHDX
  operations (create, attach, detach, merge) via P/Invoke, while a CLI tool
  communicates with it over a local gRPC/named-pipe channel.
